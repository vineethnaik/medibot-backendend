spring:
  datasource:
    # Default: H2 in-memory (no local Postgres needed). On Render set SPRING_PROFILES_ACTIVE=production and SPRING_DATASOURCE_*.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:medibot}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

app:
  cors:
    allowed-origins: https://medibots-health-frontend.vercel.app
  jwt:
    secret: ${JWT_SECRET:medibots-health-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000
