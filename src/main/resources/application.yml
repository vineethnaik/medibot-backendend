spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/medibot?useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: https://medibots-health-frontend.vercel.app
  jwt:
    secret: ${JWT_SECRET:medibots-health-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000
